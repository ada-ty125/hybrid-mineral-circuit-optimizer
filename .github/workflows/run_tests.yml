name: run-tests

# Run this on every branch push and pull request.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# This job installs dependencies, builds the code and runs the test framework
jobs:
  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install formatting tools
      run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

    - name: Check whitespace
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.sha }}
      run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff --check "$BASE_SHA" "$HEAD_SHA"

    - name: Check C++ formatting
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.sha }}
      run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" -- '*.cpp' '*.h' '*.hpp' \
              | grep -E '^(include|src|tests|examples)/' \
              | grep -v '^examples/rng/linux/' || true)"
          if [ -z "$files" ]; then
              echo "No changed C++ files to format-check."
              exit 0
          fi
          echo "$files" | xargs clang-format --dry-run --Werror

  run-tests:
    # Please don't run on MacOS runners, they are not generally worth the cost
    # If you believe you need MacOS runners, please contact the course staff first
    # It's okay to run on Windows runners, but they are often slower than Linux runners
    # to get results.

    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    # Install Python
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13

    # Install dependencies
    - name: Install dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev build-essential

    - name: Configure the code
      run: |
          cmake .

    - name: Build the graph library dependency
      run: |
          make esegraph

    - name: Build the GA library
      run: |
          make geneticAlgorithm

    - name: Build the circuit simulator library
      run: |
          make circuitSimulator

    - name: Build the circuit optimizer
      run: |
          make Circuit_Optimizer

    - name: Run the tests
      run: |
          make all
          ctest -VV

name: run-tests

# Run this on every branch push and pull request.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# This job installs dependencies, builds the code and runs the test framework
jobs:
  formatting:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install formatting tools
      run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

    - name: Check whitespace
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.sha }}
      run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
              || ! git rev-parse --verify "$BASE_SHA^{commit}" >/dev/null 2>&1; then
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                  BASE_SHA="$(git rev-parse HEAD^)"
              else
                  BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
              fi
          fi
          git diff --check "$BASE_SHA" "$HEAD_SHA"

    - name: Check C++ formatting
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.sha }}
      run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] \
              || ! git rev-parse --verify "$BASE_SHA^{commit}" >/dev/null 2>&1; then
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                  BASE_SHA="$(git rev-parse HEAD^)"
              else
                  BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
              fi
          fi
          files="$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA" -- '*.cpp' '*.h' '*.hpp' \
              | grep -E '^(include|src|tests|examples)/' \
              | grep -v '^examples/rng/linux/' || true)"
          if [ -z "$files" ]; then
              echo "No changed C++ files to format-check."
              exit 0
          fi
          echo "$files" | xargs clang-format --dry-run --Werror

  run-tests:
    # Please don't run on MacOS runners, they are not generally worth the cost
    # If you believe you need MacOS runners, please contact the course staff first
    # It's okay to run on Windows runners, but they are often slower than Linux runners
    # to get results.

    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: 'recursive'

    # Install dependencies
    - name: Install dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev build-essential

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --parallel 2

    - name: Run the tests
      run: |
          ctest --test-dir build --output-on-failure
